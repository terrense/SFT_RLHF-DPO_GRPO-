# R5 终版 · 全量 v1.1 + R1-R3 最优配置,交付 SFT adapter(=DPO 起点)。AutoDL 单卡(或主卡)。
model_name_or_path: /root/autodl-tmp/models/Qwen3-8B-Base
trust_remote_code: true
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all
dataset: sft_v11_full
eval_dataset: sft_v11_dev1k
dataset_dir: /root/autodl-tmp/data
template: qwen3
cutoff_len: 2048
packing: true                 # 全量长训开 packing 提吞吐(短样本多)
preprocessing_num_workers: 16
output_dir: /root/autodl-tmp/outputs/r5/sft_v11_final
logging_steps: 20
save_steps: 2000
save_total_limit: 2
save_only_model: true
plot_loss: true
overwrite_output_dir: true
report_to: none
seed: 42
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
optim: adamw_torch
bf16: true
gradient_checkpointing: true
flash_attn: fa2
per_device_eval_batch_size: 8
eval_strategy: steps
eval_steps: 500

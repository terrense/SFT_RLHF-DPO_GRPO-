# ============================================================
# CPT 真实全量 —— 灌真实医学知识(教科书+百科,~130M token,1轮)
# 低lr减少灾难性遗忘。训完测CMB,对比base 73.8%决定SFT从哪起步。
# ============================================================
model_name_or_path: /data/shenxin/rlhf_lab/models/Qwen3-8B-Base
trust_remote_code: true

stage: pt
do_train: true
finetuning_type: lora
lora_rank: 32
lora_target: all

dataset: med_cpt_real,med_cpt_ency        # 教科书 + 百科
dataset_dir: /data/shenxin/rlhf_lab/data
cutoff_len: 2048
max_samples: 500000                        # 覆盖全部36.9万条
packing: true
preprocessing_num_workers: 16

output_dir: /data/shenxin/rlhf_lab/outputs/cpt_real_full
logging_steps: 20
save_steps: 2000
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
report_to: none

per_device_train_batch_size: 2
gradient_accumulation_steps: 8             # 有效batch=16
learning_rate: 1.0e-5                      # ★低lr:CPT减少遗忘
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true

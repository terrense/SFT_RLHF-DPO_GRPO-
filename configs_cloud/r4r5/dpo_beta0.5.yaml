# DPO训练模板(0.5占位)。Instruct+sft_final起点,四卡。qwen3_nothink模板。
model_name_or_path: /root/autodl-tmp/models/Qwen3-8B-Instruct
adapter_name_or_path: /root/autodl-tmp/outputs/sft_final
trust_remote_code: true
stage: dpo
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_target: all
pref_beta: 0.5
pref_loss: sigmoid
dataset: dpo_pairs
dataset_dir: /root/autodl-tmp/data
template: qwen3_nothink
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 16
output_dir: /root/autodl-tmp/outputs/dpo_beta0.5
overwrite_output_dir: true
report_to: none
seed: 42
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true
flash_attn: sdpa
ddp_timeout: 180000000
logging_steps: 20
save_steps: 100000
eval_strategy: "no"

# R4 数据对照 · 单臂模板(占位 __ARM__ / __GPU__)。AutoDL 4×5090D,一卡一臂并行。
# 唯一变量=数据(dataset),超参全锁 R1-R3 最优。
model_name_or_path: /root/autodl-tmp/models/Qwen3-8B-Base
trust_remote_code: true
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all
dataset: __ARM__
#eval_dataset: sft_v11_dev1k
dataset_dir: /root/autodl-tmp/data
template: qwen3
cutoff_len: 2048
packing: false
preprocessing_num_workers: 8
output_dir: /root/autodl-tmp/outputs/r4/__ARM__
logging_steps: 20
save_steps: 600
save_only_model: true
plot_loss: true
overwrite_output_dir: true
report_to: none
seed: 42
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
optim: adamw_torch
bf16: true
gradient_checkpointing: true
flash_attn: sdpa
per_device_eval_batch_size: 1
eval_strategy: "no"

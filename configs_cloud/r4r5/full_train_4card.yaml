# 全量正式SFT(交付模型):Qwen3-8B-Instruct + qwen3_nothink + 心理危机强化数据
# 双卡GPU1+3。有效batch=2×4×2=16。1个epoch(instruct基座+全量,1ep足够且防灾难遗忘)
model_name_or_path: /root/autodl-tmp/models/Qwen3-8B-Instruct
trust_remote_code: true
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all
dataset: sft_v12_full
dataset_dir: /root/autodl-tmp/data
template: qwen3_nothink
cutoff_len: 2048
packing: true
preprocessing_num_workers: 16
output_dir: /root/autodl-tmp/outputs/sft_final
overwrite_output_dir: true
report_to: none
seed: 42
per_device_train_batch_size: 2
gradient_accumulation_steps: 2
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
optim: adamw_torch
bf16: true
gradient_checkpointing: true
flash_attn: sdpa
ddp_timeout: 180000000
logging_steps: 20
save_steps: 400
save_total_limit: 2
eval_strategy: "no"

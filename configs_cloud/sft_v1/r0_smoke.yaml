# ============================================================
# R0 冒烟 · sft_v1 管线验证(2k 分层子集)
# 验证:数据加载(sharegpt+assistant先手修复)/ loss 下降 / 评测循环 / 产物保存
# §10 规范:全字段显式,无隐式默认
# ============================================================

### model
model_name_or_path: /data/shenxin/rlhf_lab/models/Qwen3-8B-Base
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
dataset: sft_v1_smoke2k
dataset_dir: /data/shenxin/rlhf_lab/data
template: qwen3
cutoff_len: 2048
packing: false
preprocessing_num_workers: 8

### output
output_dir: /data/shenxin/rlhf_lab/outputs/sft_v1/r0_smoke
logging_steps: 5
save_steps: 1000
save_only_model: true
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
seed: 42
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
optim: adamw_torch
bf16: true
gradient_checkpointing: true
flash_attn: sdpa            # 5133 无 flash-attn;AutoDL 上改 fa2(跨机不比吞吐,只比组内)

### eval
val_size: 0.05
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 40
